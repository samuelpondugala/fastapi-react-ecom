name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  fastapi:
    name: FastAPI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: fastapi/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  react:
    name: React Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
